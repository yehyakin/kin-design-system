name: Validate documentation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install validation dependencies
        run: npm ci

      - name: Validate contracts, catalogs, integrations, release, and generated artifacts
        run: npm run validate

      - name: Validate immutable Agent history and publication evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run agent:check:history && npm run agent:check:published

      - name: Test design tooling
        run: npm run test:tooling

  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check the private React integration laboratory
        run: npm run runtime:check

  node-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up minimum supported Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 20.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify contracts and tooling on the minimum Node.js version
        run: npm run validate && npm run test:tooling && npm run runtime:check

  react-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        react:
          - 18.2.0
          - 19.2.7
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the React integration laboratory
        run: npm run runtime:build

      - name: Install the compatibility browser
        run: npx playwright install --with-deps chromium

      - name: Verify SSR and hydration with React ${{ matrix.react }}
        env:
          KIN_REACT_VERSION: ${{ matrix.react }}
        run: npm run runtime:compat

  reference:
    needs:
      - validate
      - runtime
      - node-compatibility
      - react-compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Install reference browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Test reference interfaces
        run: npm run test:reference

      - name: Upload reference screenshots
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: kin-reference-screenshots
          path: |
            test-results/**/*.png
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14
