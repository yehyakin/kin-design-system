name: Deploy showcase

on:
  workflow_run:
    workflows:
      - Validate documentation
      - Validate release tag
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.name == 'Validate release tag' || github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      eligible: ${{ steps.lifecycle.outputs.eligible }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check publication lifecycle
        id: lifecycle
        shell: bash
        run: |
          trigger="manual"
          if [[ "${{ github.event.workflow_run.name }}" == "Validate documentation" ]]; then
            trigger="documentation"
          elif [[ "${{ github.event.workflow_run.name }}" == "Validate release tag" ]]; then
            trigger="tag"
          fi
          node scripts/check-pages-publication.mjs --trigger "$trigger" >> "$GITHUB_OUTPUT"

      - name: Build and validate showcase
        if: steps.lifecycle.outputs.eligible == 'true'
        run: npm run site:check

      - name: Upload Pages artifact
        if: steps.lifecycle.outputs.eligible == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .site-dist

  deploy:
    if: needs.build.outputs.eligible == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
