name: Deploy showcase

on:
  workflow_run:
    workflows:
      - Validate documentation
    types:
      - completed
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      eligible: ${{ steps.lifecycle.outputs.eligible }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Require the authoritative main revision
        id: source
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          source_sha="$(git rev-parse HEAD)"
          main_sha="$(git rev-parse origin/main)"
          if [[ "$source_sha" != "$main_sha" ]]; then
            echo "Refusing to replace Pages from a stale main revision or an older Release" >&2
            exit 1
          fi
          echo "sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Check publication lifecycle
        id: lifecycle
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          trigger="manual"
          if [[ "$EVENT_NAME" == "release" ]]; then
            trigger="release"
          elif [[ "$WORKFLOW_NAME" == "Validate documentation" ]]; then
            trigger="documentation"
          fi
          node scripts/check-pages-publication.mjs --trigger "$trigger" >> "$GITHUB_OUTPUT"

      - name: Verify released publication provenance
        if: steps.lifecycle.outputs.eligible == 'true' && steps.lifecycle.outputs.verification_required == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "$EVENT_NAME" == "release" && "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Published Release tag does not match package.json" >&2
            exit 1
          fi
          git merge-base --is-ancestor HEAD origin/main
          validated_runs="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "Validate documentation" \
            --commit "$(git rev-parse HEAD)" --event push --status completed --limit 20 \
            --json conclusion --jq '[.[] | select(.conclusion == "success")] | length')"
          if [[ "$validated_runs" -lt 1 ]]; then
            echo "No successful Validate documentation push run exists for the release commit" >&2
            exit 1
          fi
          gh release view "$expected_tag" --repo "$GITHUB_REPOSITORY" --json isDraft,isPrerelease,tagName --jq \
            'select(.isDraft == false and .isPrerelease == false and .tagName == "'"$expected_tag"'") | .tagName' | grep -Fx "$expected_tag"

      - name: Build and validate showcase
        if: steps.lifecycle.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run agent:check:history && npm run agent:check:published && npm run site:check

      - name: Upload Pages artifact
        if: steps.lifecycle.outputs.eligible == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .site-dist

  deploy:
    if: needs.build.outputs.eligible == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out current main for final freshness verification
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Recheck the authoritative source immediately before deployment
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA" || {
            echo "Refusing to deploy an artifact that is no longer current main" >&2
            exit 1
          }

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  verify:
    if: needs.build.outputs.eligible == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    timeout-minutes: 10
    steps:
      - name: Check out the deployed source revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.build.outputs.source_sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Refuse stale success after deployment
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$(git rev-parse origin/main)" = "$SOURCE_SHA" || {
            echo "The deployed source is no longer authoritative main; a newer run must replace it" >&2
            exit 1
          }

      - name: Verify deployed Agent responses
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: node scripts/verify-agent-responses.mjs --base-url "$PAGE_URL"
