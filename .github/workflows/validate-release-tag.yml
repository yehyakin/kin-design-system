name: Validate release tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tagged release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Match tag to package version
        run: node --input-type=module -e "import fs from 'node:fs'; const version = JSON.parse(fs.readFileSync('package.json', 'utf8')).version; if (process.env.GITHUB_REF_NAME !== 'v' + version) { console.error('Tag ' + process.env.GITHUB_REF_NAME + ' does not match package version ' + version); process.exit(1); }"

      - name: Require the tagged commit on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD refs/remotes/origin/main || {
            echo "The tagged commit is not reachable from origin/main." >&2
            exit 1
          }

      - name: Validate the tagged release
        run: npm run validate && npm run release:check:post-tag
