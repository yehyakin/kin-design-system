<!doctype html>
<html lang="zh-CN" data-theme="light" data-theme-preference="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f7f8" />
    <title>KIN System State Reference</title>
    <script>
      (() => {
        const preference = localStorage.getItem("kin-reference-theme") || "system";
        const resolved = preference === "system" ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : preference;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePreference = preference;
      })();
    </script>
    <link rel="stylesheet" href="../product-patterns/patterns.css" />
    <link rel="stylesheet" href="./page-patterns.css" />
    <script type="module" src="./reference.js"></script>
  </head>
  <body class="flow-page" data-page="system">
    <header class="flow-header">
      <a class="flow-brand" href="../../"><strong>KIN</strong><span data-i18n="common.reference">页面流程参考</span></a>
      <div class="flow-preferences">
        <div class="language-control">
          <button class="icon-control" type="button" data-language-trigger aria-haspopup="menu" aria-expanded="false" aria-controls="language-menu" data-i18n-aria="common.language"><i data-lucide="languages" aria-hidden="true"></i></button>
          <div class="language-menu preference-menu" id="language-menu" data-language-menu role="menu" data-state="closed" hidden><button type="button" role="menuitemradio" aria-checked="true" data-language-option="zh-CN">中文</button><button type="button" role="menuitemradio" aria-checked="false" data-language-option="en">English</button></div>
        </div>
        <div class="theme-control">
          <button class="theme-switch canonical-theme-switch" type="button" role="switch" aria-checked="false" data-theme-switch data-i18n-aria="common.themeDark"><span class="theme-switch-icon"><i class="theme-sun" data-lucide="sun" aria-hidden="true"></i></span><span class="theme-switch-track" aria-hidden="true"><span></span></span><span class="theme-switch-icon"><i class="theme-moon" data-lucide="moon" aria-hidden="true"></i></span></button>
          <button class="icon-control theme-menu-trigger" type="button" data-theme-menu-trigger aria-haspopup="menu" aria-expanded="false" aria-controls="theme-menu" data-i18n-aria="common.themeMenu"><i data-lucide="chevron-down" aria-hidden="true"></i></button>
          <div class="theme-menu preference-menu" id="theme-menu" data-theme-menu role="menu" data-state="closed" hidden><button type="button" role="menuitemradio" aria-checked="false" data-theme-option="light" data-i18n="common.themeLightChoice">日间模式</button><button type="button" role="menuitemradio" aria-checked="false" data-theme-option="dark" data-i18n="common.themeDarkChoice">夜间模式</button><button type="button" role="menuitemradio" aria-checked="true" data-theme-option="system" data-i18n="common.themeSystemChoice">跟随系统</button></div>
        </div>
      </div>
    </header>

    <main class="system-shell">
      <nav class="system-nav" aria-labelledby="system-nav-title">
        <h1 id="system-nav-title" data-i18n="system.title">系统与恢复</h1>
        <div class="system-nav-list">
          <button type="button" data-system-state="session"><span data-i18n="system.sessionNav">会话失效</span><code>401</code></button>
          <button type="button" data-system-state="forbidden"><span data-i18n="system.forbiddenNav">权限不足</span><code>403</code></button>
          <button type="button" data-system-state="not-found"><span data-i18n="system.notFoundNav">对象不存在</span><code>404</code></button>
          <button type="button" data-system-state="conflict"><span data-i18n="system.conflictNav">内容冲突</span><code>409</code></button>
          <button type="button" data-system-state="offline"><span data-i18n="system.offlineNav">离线</span><code>NET</code></button>
          <button type="button" data-system-state="rate-limit"><span data-i18n="system.rateLimitNav">请求过多</span><code>429</code></button>
          <button type="button" data-system-state="server"><span data-i18n="system.serverNav">服务错误</span><code>5XX</code></button>
        </div>
      </nav>

      <section class="system-main">
        <article class="system-state">
          <div class="state-icon" aria-hidden="true"><i data-lucide="alert-triangle"></i></div>
          <p class="object-id"><span data-i18n="system.codeLabel">状态代码</span> · <span data-system-code>401</span></p>
          <h2 tabindex="-1" data-system-title>会话已失效</h2>
          <p data-system-body>为了保护当前工作区，系统需要重新确认你的身份。</p>
          <div class="preservation-note"><i data-lucide="shield-check" aria-hidden="true"></i><span data-system-preservation>当前页面位置和未提交的本地更改会保留。</span></div>
          <div class="system-actions"><button class="flow-button primary-action" type="button" data-system-primary>重新登录</button><button class="flow-button" type="button" data-system-secondary>返回只读视图</button></div>
          <p class="form-status" data-system-status tabindex="-1" aria-live="polite"></p>
          <dl class="system-details">
            <div><dt data-i18n="system.detailScope">恢复范围</dt><dd data-i18n="system.detailScopeValue">当前对象与导航状态</dd></div>
            <div><dt data-i18n="system.detailTime">记录时间</dt><dd>2026-07-13 14:32 CST</dd></div>
            <div><dt data-i18n="system.detailId">参考 ID</dt><dd><code>REF-7F2A</code></dd></div>
          </dl>
        </article>
      </section>
    </main>

  </body>
</html>
