<!doctype html>
<html lang="zh-CN" data-theme="light" data-theme-preference="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f7f8" />
    <title>KIN Access Reference</title>
    <script>
      (() => {
        const preference = localStorage.getItem("kin-reference-theme") || "system";
        const resolved = preference === "system"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : preference;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePreference = preference;
      })();
    </script>
    <link rel="stylesheet" href="../product-patterns/patterns.css" />
    <link rel="stylesheet" href="./page-patterns.css" />
    <script type="module" src="./reference.js"></script>
  </head>
  <body class="flow-page" data-page="access">
    <header class="flow-header">
      <a class="flow-brand" href="../../">
        <strong>KIN</strong>
        <span data-i18n="common.reference">页面流程参考</span>
      </a>
      <div class="flow-preferences">
        <div class="language-control">
          <button class="icon-control" type="button" data-language-trigger aria-haspopup="menu" aria-expanded="false" aria-controls="language-menu" data-i18n-aria="common.language">
            <i data-lucide="languages" aria-hidden="true"></i>
          </button>
          <div class="language-menu preference-menu" id="language-menu" data-language-menu role="menu" data-state="closed" hidden>
            <button type="button" role="menuitemradio" aria-checked="true" data-language-option="zh-CN">中文</button>
            <button type="button" role="menuitemradio" aria-checked="false" data-language-option="en">English</button>
          </div>
        </div>
        <div class="theme-control">
          <button class="theme-switch canonical-theme-switch" type="button" role="switch" aria-checked="false" data-theme-switch data-i18n-aria="common.themeDark">
            <span class="theme-switch-icon"><i class="theme-sun" data-lucide="sun" aria-hidden="true"></i></span>
            <span class="theme-switch-track" aria-hidden="true"><span></span></span>
            <span class="theme-switch-icon"><i class="theme-moon" data-lucide="moon" aria-hidden="true"></i></span>
          </button>
          <button class="icon-control theme-menu-trigger" type="button" data-theme-menu-trigger aria-haspopup="menu" aria-expanded="false" aria-controls="theme-menu" data-i18n-aria="common.themeMenu">
            <i data-lucide="chevron-down" aria-hidden="true"></i>
          </button>
          <div class="theme-menu preference-menu" id="theme-menu" data-theme-menu role="menu" data-state="closed" hidden>
            <button type="button" role="menuitemradio" aria-checked="false" data-theme-option="light" data-i18n="common.themeLightChoice">日间模式</button>
            <button type="button" role="menuitemradio" aria-checked="false" data-theme-option="dark" data-i18n="common.themeDarkChoice">夜间模式</button>
            <button type="button" role="menuitemradio" aria-checked="true" data-theme-option="system" data-i18n="common.themeSystemChoice">跟随系统</button>
          </div>
        </div>
      </div>
    </header>

    <main class="access-layout">
      <section class="access-context" aria-labelledby="access-context-title">
        <div>
          <p class="object-id" data-i18n="access.destination">返回：风险审查 / SIG-042</p>
          <h1 id="access-context-title" data-i18n="access.contextTitle">验证身份后继续当前工作</h1>
          <p data-i18n="access.contextBody">登录只处理访问恢复。系统会保留当前对象、筛选条件和未提交的本地草稿。</p>
        </div>
        <ul class="context-list">
          <li><i data-lucide="shield-check" aria-hidden="true"></i><span data-i18n="access.contextSecure">凭据由产品的身份服务处理，本参考页不会发送或保存凭据。</span></li>
          <li><i data-lucide="refresh-cw" aria-hidden="true"></i><span data-i18n="access.contextResume">验证成功后返回原任务，不把用户送到无关首页。</span></li>
          <li><i data-lucide="circle-help" aria-hidden="true"></i><span data-i18n="access.contextHelp">账号、组织和恢复策略由采用产品配置，KIN 不假设认证后端。</span></li>
        </ul>
      </section>

      <section class="access-task" data-i18n-aria="access.task">
        <div class="auth-panel" data-sign-in-view>
          <h2 tabindex="-1" data-i18n="access.signInTitle">登录工作区</h2>
          <p data-i18n="access.signInBody">使用分配给你的工作邮箱。</p>
          <form class="auth-form" data-sign-in-form>
            <div class="flow-field">
              <label for="sign-in-email" data-i18n="access.email">工作邮箱</label>
              <input id="sign-in-email" name="email" type="email" autocomplete="username" required data-i18n-placeholder="access.emailPlaceholder" />
            </div>
            <div class="flow-field">
              <label for="sign-in-password" data-i18n="access.password">密码</label>
              <div class="password-wrap">
                <input id="sign-in-password" name="password" type="password" autocomplete="current-password" required />
                <button class="icon-control password-toggle" type="button" data-password-toggle aria-controls="sign-in-password" aria-pressed="false" data-i18n-aria="access.showPassword">
                  <i class="eye" data-lucide="eye" aria-hidden="true"></i>
                  <i class="eye-off" data-lucide="eye-off" aria-hidden="true"></i>
                </button>
              </div>
            </div>
            <div class="auth-row">
              <label><input type="checkbox" name="remember" /> <span data-i18n="access.remember">在这台设备上保持登录</span></label>
              <button class="text-action" type="button" data-recovery-open data-i18n="access.forgot">无法登录？</button>
            </div>
            <button class="flow-button primary-action auth-submit" type="submit" data-i18n="access.continue">继续</button>
            <p class="form-status" data-sign-in-status tabindex="-1" aria-live="polite"></p>
            <div class="auth-divider" data-i18n="access.or">或</div>
            <button class="flow-button provider-action" type="button" disabled aria-describedby="sso-unavailable"><i data-lucide="key-round" aria-hidden="true"></i><span data-i18n="access.sso">使用组织 SSO</span></button>
            <p class="provider-note" id="sso-unavailable" data-i18n="access.ssoUnavailable">此确定性参考未配置组织 SSO。</p>
          </form>
          <div class="auth-footer">
            <span data-i18n="access.referenceNote">确定性参考：不会传输凭据。</span>
            <button class="text-action" type="button" data-reauth-open data-i18n="access.reauthDemo">查看页内重新验证</button>
          </div>
          <div class="auth-fixture" data-auth-fixture data-fixture-state="idle">
            <div class="auth-fixture-control">
              <label for="auth-fixture-state" data-i18n="access.fixtureLabel">确定性状态</label>
              <select id="auth-fixture-state" data-auth-fixture-select>
                <option value="idle" data-i18n="access.fixtureIdleChoice">空闲</option>
                <option value="throttled" data-i18n="access.fixtureThrottledChoice">请求受限</option>
                <option value="locked" data-i18n="access.fixtureLockedChoice">账号被锁定或管理员阻止</option>
                <option value="provider-unavailable" data-i18n="access.fixtureProviderChoice">身份提供方不可用</option>
                <option value="offline" data-i18n="access.fixtureOfflineChoice">离线</option>
                <option value="expired" data-i18n="access.fixtureExpiredChoice">验证已过期</option>
                <option value="verified" data-i18n="access.fixtureVerifiedChoice">已验证（参考）</option>
                <option value="session-expired" data-i18n="access.fixtureSessionExpiredChoice">会话已过期</option>
              </select>
            </div>
            <p data-auth-fixture-status role="status" aria-live="polite"></p>
          </div>
        </div>

        <div class="auth-panel" data-recovery-view hidden>
          <button class="text-action inline-icon" type="button" data-recovery-back><i data-lucide="arrow-left" aria-hidden="true"></i><span data-i18n="access.back">返回登录</span></button>
          <h2 tabindex="-1" data-i18n="access.recoveryTitle">恢复访问</h2>
          <p data-i18n="access.recoveryBody">输入工作邮箱。无论账号是否存在，页面都显示相同结果。</p>
          <form class="auth-form" data-recovery-form>
            <div class="flow-field">
              <label for="recovery-email" data-i18n="access.email">工作邮箱</label>
              <input id="recovery-email" name="email" type="email" autocomplete="username" required data-i18n-placeholder="access.emailPlaceholder" />
            </div>
            <button class="flow-button primary-action auth-submit" type="submit" data-i18n="access.sendRecovery">发送恢复说明</button>
            <p class="form-status" data-recovery-status tabindex="-1" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <dialog class="auth-dialog" data-reauth-dialog data-state="closed" aria-labelledby="reauth-title">
      <form data-reauth-form>
        <header>
          <h2 id="reauth-title" data-i18n="access.reauthTitle">重新验证身份</h2>
          <p data-i18n="access.reauthBody">导出敏感记录前需要确认当前会话。</p>
        </header>
        <div class="dialog-body auth-form">
          <div class="flow-field">
            <label for="reauth-password" data-i18n="access.password">密码</label>
            <input id="reauth-password" type="password" autocomplete="current-password" required />
          </div>
          <p class="form-status" data-reauth-status tabindex="-1" aria-live="polite"></p>
        </div>
        <footer>
          <button class="flow-button" type="button" data-reauth-cancel data-i18n="common.cancel">取消</button>
          <button class="flow-button primary-action" type="submit" data-i18n="access.verify">验证并继续</button>
        </footer>
      </form>
    </dialog>

  </body>
</html>
